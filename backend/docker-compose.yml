# vistaseeds backend — MariaDB + API
# Ağ: ecosystem-network (diğer ekosistem servisleri aynı isimli external ağ ile bağlanabilir)
# Sadece DB: docker compose up -d vistaseeds-db
# Tam yığın: docker compose up -d
# Geliştirme override: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  vistaseeds-db:
    image: mariadb:10.11
    container_name: vistaseeds-mariadb
    restart: unless-stopped
    networks:
      - ecosystem-network
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${DB_NAME:-mydb}
      MARIADB_USER: ${DB_USER:-app}
      MARIADB_PASSWORD: ${DB_PASSWORD:-app}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - vistaseeds-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "$$MARIADB_USER", "--password=$$MARIADB_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  vistaseeds-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vistaseeds-backend
    restart: unless-stopped
    networks:
      - ecosystem-network
    env_file:
      - .env
    environment:
      DB_HOST: vistaseeds-db
      DB_PORT: 3306
      PORT: ${PORT:-8083}
    ports:
      - "${PORT:-8083}:8083"
    depends_on:
      vistaseeds-db:
        condition: service_healthy
    volumes:
      - vistaseeds-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8083/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  vistaseeds-db-data:
  vistaseeds-uploads:

networks:
  ecosystem-network:
    name: ecosystem-network
    driver: bridge
