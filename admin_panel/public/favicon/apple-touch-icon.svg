<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="wg" cx="38%" cy="30%" r="70%">
      <stop offset="0%" stop-color="hsl(155,38%,50%)"/>
      <stop offset="100%" stop-color="hsl(153,42%,16%)"/>
    </radialGradient>
    <linearGradient id="lg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="hsl(153,39%,30%)"/>
      <stop offset="100%" stop-color="hsl(151,39%,60%)"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15.5" fill="hsl(153,39%,30%)" stroke="hsl(30,64%,53%)" stroke-width="1"/>

  <!-- Walnut body -->
  <ellipse cx="16" cy="16" rx="10" ry="11" fill="url(#wg)"/>
  <ellipse cx="16" cy="16" rx="7.5" ry="8.5" fill="hsl(153,42%,18%)"/>

  <!-- Main suture arch — the key identifying feature -->
  <path d="M7 16 Q16 7 25 16" stroke="hsl(30,64%,58%)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- Vertical suture -->
  <line x1="16" y1="6" x2="16" y2="26" stroke="hsl(30,64%,58%)" stroke-width="0.9" opacity="0.5"/>
  <!-- Upper arc -->
  <path d="M9 11 Q16 18 23 11" stroke="hsl(30,64%,58%)" stroke-width="0.7" fill="none" opacity="0.4"/>

  <!-- Leaf -->
  <path d="M23 5 Q30 2 29 10 Q25 7 23 5Z" fill="url(#lg)"/>
</svg>
