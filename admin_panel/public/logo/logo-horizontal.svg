<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <style>
      .font-playfair { font-family: 'Playfair Display', Georgia, serif; }
      .font-nunito   { font-family: 'Nunito', 'Segoe UI', sans-serif; }
    </style>
    <!-- Ceviz gradient -->
    <radialGradient id="walnutGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="hsl(155,38%,46%)"/>
      <stop offset="100%" stop-color="hsl(153,42%,18%)"/>
    </radialGradient>
    <!-- Leaf gradient -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="hsl(151,39%,57%)"/>
      <stop offset="100%" stop-color="hsl(153,39%,30%)"/>
    </linearGradient>
    <!-- Amber glow -->
    <filter id="amberGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feFlood flood-color="hsl(30,64%,53%)" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="hsl(153,42%,10%)" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ─── WALNUT ICON ─── -->
  <g transform="translate(8, 8)" filter="url(#softShadow)">
    <!-- Outer shell base -->
    <ellipse cx="32" cy="33" rx="28" ry="29" fill="url(#walnutGrad)"/>
    <!-- Inner texture ring -->
    <ellipse cx="32" cy="33" rx="22" ry="23" fill="hsl(153,42%,18%)"/>
    <!-- Suture line — horizontal arch -->
    <path d="M5 33 Q32 7 59 33" stroke="hsl(30,64%,53%)" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- Suture line — vertical -->
    <line x1="32" y1="5" x2="32" y2="61" stroke="hsl(30,64%,53%)" stroke-width="1.2" opacity="0.5"/>
    <!-- Upper suture arc -->
    <path d="M10 19 Q32 39 54 19" stroke="hsl(30,64%,53%)" stroke-width="1" fill="none" opacity="0.45" stroke-linecap="round"/>
    <!-- Lower suture arc -->
    <path d="M10 47 Q32 30 54 47" stroke="hsl(30,64%,53%)" stroke-width="1" fill="none" opacity="0.45" stroke-linecap="round"/>
    <!-- Highlight specular -->
    <ellipse cx="22" cy="19" rx="9" ry="5.5" fill="hsl(155,38%,41%)" opacity="0.45" transform="rotate(-25,22,19)"/>
    <!-- Base shadow ellipse -->
    <ellipse cx="32" cy="64" rx="18" ry="4" fill="hsl(153,42%,10%)" opacity="0.25"/>
    <!-- LEAF -->
    <path d="M50 9 Q74 0 70 24 Q58 18 50 9Z" fill="url(#leafGrad)"/>
    <path d="M50 9 Q65 16 70 24" stroke="hsl(151,39%,67%)" stroke-width="1" fill="none" opacity="0.7"/>
    <!-- Leaf vein -->
    <path d="M52 10 Q61 17 68 23" stroke="hsl(153,27%,93%)" stroke-width="0.6" fill="none" opacity="0.5"/>
  </g>

  <!-- ─── WORDMARK ─── -->
  <!-- "Kaman" — Playfair Display, primary color -->
  <text x="88" y="38"
        class="font-playfair"
        font-size="26" font-weight="900"
        fill="hsl(153,42%,18%)"
        letter-spacing="-0.3">Kaman</text>
  <!-- "İLAN" — Nunito, accent amber, spaced -->
  <text x="89" y="58"
        class="font-nunito"
        font-size="16" font-weight="800"
        fill="hsl(30,64%,53%)"
        letter-spacing="5">İLAN</text>

  <!-- Accent dot after İLAN -->
  <circle cx="167" cy="54" r="3.5" fill="hsl(155,38%,41%)"/>

  <!-- Thin separator line between Kaman and İLAN -->
  <line x1="89" y1="44" x2="280" y2="44" stroke="hsl(148,19%,83%)" stroke-width="0.8"/>

  <!-- Tagline -->
  <text x="89" y="72"
        class="font-nunito"
        font-size="8.5" font-weight="600"
        fill="hsl(168,19%,40%)"
        letter-spacing="1.8">KIRŞEHİR · KAMAN İLÇESİ</text>
</svg>
