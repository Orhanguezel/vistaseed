<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <radialGradient id="wg" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="hsl(155,38%,50%)"/>
      <stop offset="100%" stop-color="hsl(153,42%,16%)"/>
    </radialGradient>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="hsl(151,39%,60%)"/>
      <stop offset="100%" stop-color="hsl(153,39%,32%)"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="hsl(153,42%,10%)" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- ─── ICON (centered, large) ─── -->
  <g transform="translate(55, 8)" filter="url(#sh)">
    <!-- Shell -->
    <ellipse cx="45" cy="47" rx="40" ry="43" fill="url(#wg)"/>
    <ellipse cx="45" cy="47" rx="32" ry="35" fill="hsl(153,42%,18%)"/>
    <!-- Main suture arch -->
    <path d="M7 47 Q45 8 83 47" stroke="hsl(30,64%,55%)" stroke-width="2.8" fill="none" stroke-linecap="round"/>
    <!-- Vertical suture -->
    <line x1="45" y1="6" x2="45" y2="88" stroke="hsl(30,64%,55%)" stroke-width="1.5" opacity="0.5"/>
    <!-- Upper arc -->
    <path d="M13 27 Q45 56 77 27" stroke="hsl(30,64%,55%)" stroke-width="1.2" fill="none" opacity="0.4" stroke-linecap="round"/>
    <!-- Lower arc -->
    <path d="M13 67 Q45 48 77 67" stroke="hsl(30,64%,55%)" stroke-width="1.2" fill="none" opacity="0.4" stroke-linecap="round"/>
    <!-- Specular highlight -->
    <ellipse cx="29" cy="27" rx="13" ry="8" fill="hsl(155,38%,44%)" opacity="0.4" transform="rotate(-25,29,27)"/>
    <!-- Base shadow -->
    <ellipse cx="45" cy="94" rx="26" ry="5.5" fill="hsl(153,42%,8%)" opacity="0.2"/>
    <!-- Leaf -->
    <path d="M71 11 Q100 1 96 32 Q81 24 71 11Z" fill="url(#lg)"/>
    <path d="M71 11 Q89 21 96 32" stroke="hsl(151,39%,70%)" stroke-width="1.3" fill="none" opacity="0.65"/>
    <path d="M73 13 Q85 22 94 31" stroke="hsl(135,27%,95%)" stroke-width="0.7" fill="none" opacity="0.45"/>
  </g>

  <!-- Amber ring accent below icon -->
  <circle cx="100" cy="115" r="42" fill="none" stroke="hsl(30,64%,53%)" stroke-width="0.7" opacity="0.3"/>

  <!-- ─── WORDMARK ─── -->
  <!-- "Kaman" -->
  <text x="100" y="150"
        font-family="'Playfair Display', Georgia, serif"
        font-size="30" font-weight="900"
        fill="hsl(153,42%,18%)"
        text-anchor="middle"
        letter-spacing="-0.5">Kaman</text>

  <!-- Amber underline accent -->
  <line x1="38" y1="157" x2="162" y2="157" stroke="hsl(30,64%,53%)" stroke-width="2" stroke-linecap="round"/>

  <!-- "İLAN" -->
  <text x="100" y="180"
        font-family="'Nunito', 'Segoe UI', sans-serif"
        font-size="17" font-weight="800"
        fill="hsl(30,64%,53%)"
        text-anchor="middle"
        letter-spacing="8">İLAN</text>

  <!-- Green dot decoration -->
  <circle cx="60" cy="176" r="3" fill="hsl(151,39%,52%)"/>
  <circle cx="140" cy="176" r="3" fill="hsl(151,39%,52%)"/>

  <!-- Tagline -->
  <text x="100" y="205"
        font-family="'Nunito', 'Segoe UI', sans-serif"
        font-size="8" font-weight="600"
        fill="hsl(168,19%,45%)"
        text-anchor="middle"
        letter-spacing="2">KIRŞEHİR · KAMAN</text>
</svg>
