<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="wg" cx="38%" cy="30%" r="70%">
      <stop offset="0%" stop-color="hsl(155,38%,52%)"/>
      <stop offset="100%" stop-color="hsl(153,42%,16%)"/>
    </radialGradient>
    <linearGradient id="lg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="hsl(153,39%,32%)"/>
      <stop offset="100%" stop-color="hsl(151,39%,62%)"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="hsl(153,42%,8%)" flood-opacity="0.3"/>
    </filter>
    <!-- Outer amber ring glow -->
    <filter id="glow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="hsl(30,64%,53%)" flood-opacity="0.4" result="c"/>
      <feComposite in="c" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer amber ring -->
  <circle cx="50" cy="50" r="48" fill="hsl(153,42%,18%)" stroke="hsl(30,64%,53%)" stroke-width="2"/>

  <!-- Walnut body -->
  <g filter="url(#sh)">
    <ellipse cx="50" cy="49" rx="31" ry="33" fill="url(#wg)"/>
    <ellipse cx="50" cy="49" rx="24" ry="26" fill="hsl(153,42%,18%)"/>

    <!-- Main suture arch -->
    <path d="M20 49 Q50 18 80 49" stroke="hsl(30,64%,58%)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Vertical suture -->
    <line x1="50" y1="17" x2="50" y2="81" stroke="hsl(30,64%,58%)" stroke-width="1.3" opacity="0.5"/>
    <!-- Upper detail arc -->
    <path d="M25 33 Q50 54 75 33" stroke="hsl(30,64%,58%)" stroke-width="1.1" fill="none" opacity="0.42" stroke-linecap="round"/>
    <!-- Lower detail arc -->
    <path d="M25 65 Q50 47 75 65" stroke="hsl(30,64%,58%)" stroke-width="1.1" fill="none" opacity="0.42" stroke-linecap="round"/>

    <!-- Specular -->
    <ellipse cx="37" cy="33" rx="10" ry="6" fill="hsl(155,38%,46%)" opacity="0.4" transform="rotate(-22,37,33)"/>

    <!-- Base shadow -->
    <ellipse cx="50" cy="84" rx="20" ry="4" fill="hsl(153,42%,8%)" opacity="0.3"/>
  </g>

  <!-- LEAF — top right -->
  <path d="M69 14 Q91 6 88 28 Q76 21 69 14Z" fill="url(#lg)"/>
  <path d="M69 14 Q82 20 88 28" stroke="hsl(151,39%,70%)" stroke-width="1.2" fill="none" opacity="0.6"/>
  <!-- leaf vein -->
  <path d="M71 16 Q80 22 87 27" stroke="hsl(135,27%,93%)" stroke-width="0.6" fill="none" opacity="0.45"/>
</svg>
